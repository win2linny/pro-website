<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Faith Tracker | Official</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1a;       /* Charcoal Black */
            --card: #262626;     /* Dark Grey */
            --accent: #d4af37;   /* Metallic Gold */
            --text: #ffffff;
            --muted: #a0a0a0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        nav {
            background: #000;
            padding: 1.5rem 10%;
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--accent);
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 25px;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav a:hover { color: var(--accent); }

        .container {
            max-width: 800px;
            margin: 60px auto;
            background: var(--card);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        h1 { font-family: 'Playfair Display', serif; color: var(--accent); font-size: 2.5rem; margin-top: 0; }

        .verse-box {
            border-left: 3px solid var(--accent);
            padding: 10px 20px;
            margin: 30px 0;
            background: #222;
            font-style: italic;
            color: var(--muted);
        }

        .prayer-form { display: flex; gap: 10px; margin-top: 20px; }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
        }

        button {
            background: var(--accent);
            color: black;
            padding: 0 30px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .links-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
            border-top: 1px solid #444;
            padding-top: 20px;
        }

        .project-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<nav>
    <div style="color: var(--accent); font-weight: bold; letter-spacing: 2px;">FFT MISSION CONTROL</div>
    <div>
        <a href="/">Home</a>
        <a href="/about-john">John</a>
        <a href="/about-wife">Wife</a>
        <a href="http://66.228.58">Profile</a>
    </div>
</nav>

<div class="container">
    <h1>Family Faith Tracker</h1>
    <p style="color: var(--muted);">Day {{ days }} of the Journey</p>

    <div class="verse-box">
        "{{ verse }}"
    </div>

    <form class="prayer-form" action="/submit-prayer" method="POST">
        <input type="text" name="prayer_text" placeholder="Enter a formal prayer request..." required>
        <button type="submit">SUBMIT</button>
    </form>

    <div class="links-grid">
        <a href="#" class="project-link">View Future Projects →</a>
        <a href="http://66.228.58" class="project-link">Create Account / Login →</a>
    </div>
</div>

</body>
</html>
